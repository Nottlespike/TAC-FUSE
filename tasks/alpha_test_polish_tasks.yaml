- name: tac-fuse-alpha-p0-route-guard-c2-proof
  priority: P0
  scope: contrib/TAC-FUSE/
  validation_lane: software
  prompt: |
    Working directory: AlphaHENG repo root.
    Scope: contrib/TAC-FUSE/

    Stage: Explore and Create.

    Prove the route-guard C2 path first. Audit the current demo and repair any gap where
    Patrol, Hold, Return, or Abort can update the UI without first writing
    local mission state, an audit-log entry, and a staged sync record. Offline and Degraded
    must block external sync; Online may release staged packets only by operator action.
    Route path safety should remain automatic corridor monitoring, not a manual C2 command.

    Keep object detection supporting the C2 loop. Do not make model accuracy or hardware
    readiness the reason local command authority works.

    Update focused tests and contrib/TAC-FUSE/CHANGELOG.md for behavior or demo workflow changes.
  verify_command: cd contrib/TAC-FUSE && uv run pytest tests/test_local_c2_authority.py tests/test_mission_state.py tests/test_connectivity.py -q
  metadata:
    alpha_gate: Route Guard C2
    workflow_stage: explore
    local_c2_authority_required: true
    offline_sync_block_required: true
    object_permanence_required: true
- name: tac-fuse-alpha-p0-rtx-pathing-contract
  priority: P0
  scope: contrib/TAC-FUSE/
  validation_lane: software
  prompt: |
    Working directory: AlphaHENG repo root.
    Scope: contrib/TAC-FUSE/

    Stage: Create.

    Make automatic route-guard pathing consume the same fused contacts and hazard volumes
    that the operator sees on the 3D Field C2 View. The corridor guard should score corridor edges, line of sight,
    RF-denial volumes, unknown contacts, standoff, battery, and latency. On Strix, use the
    RTX ray-tracing/CUDA geometry lane for spatial-query acceleration when available.
    Deterministic software validation must return the same route-decision shape for offline tests.

    The UI should describe the automatic corridor state, such as Corridor Guarded or
    Corridor Blocked, instead of exposing a vague compute label or manual route button.

    Update focused tests and contrib/TAC-FUSE/CHANGELOG.md for behavior or interface changes.
  verify_command: cd contrib/TAC-FUSE && uv run pytest tests/test_ray_query.py -q && uv run python scripts/check_ray_runtime.py
  metadata:
    alpha_gate: RTX Pathing
    workflow_stage: create
    rtx_pathing_required: true
    software_validation_required: true
    strix_hardware_check: uv run python scripts/check_ray_runtime.py --require-rtx
- name: tac-fuse-alpha-p0-npu-zero-shot-label-contract
  priority: P0
  scope: contrib/TAC-FUSE/
  validation_lane: software
  prompt: |
    Working directory: AlphaHENG repo root.
    Scope: contrib/TAC-FUSE/

    Stage: Create.

    Keep the Strix NPU lane as a naive zero-shot labeler for rendered field objects.
    Alpha, Bravo, Charlie, and Delta should behave as local devices that produce cue metadata
    when they see wheeled vehicles, small UAS, personnel, RF sources, or obstructions. The
    zero-shot result is a pseudo-classification by default; it becomes a detection only when
    the caller explicitly opts into that payload.

    The fusion node must attach cue labels to persistent track IDs and source IDs. The labeler
    cannot create object permanence by itself.

    Update focused tests and contrib/TAC-FUSE/CHANGELOG.md for behavior or interface changes.
  verify_command: cd contrib/TAC-FUSE && uv run pytest tests/test_zero_shot_vision.py tests/test_npu_siglip.py -q
  metadata:
    alpha_gate: NPU Zero-Shot Labels
    workflow_stage: create
    strix_npu_zero_shot_required: true
    pseudo_classification_default_required: true
    strix_hardware_check: TAC_FUSE_SIGLIP_DEVICE=NPU uv run python scripts/check_npu_runtime.py --device NPU --model-dir models/siglip2-field-npu
- name: tac-fuse-alpha-p1-trained-model-ready-boundary
  priority: P1
  scope: contrib/TAC-FUSE/
  validation_lane: software
  prompt: |
    Working directory: AlphaHENG repo root.
    Scope: contrib/TAC-FUSE/

    Stage: Create and Cleanup.

    Prepare the classifier boundary so a trained model can replace the naive zero-shot
    labeler without changing local C2, route pathing, sync, or alert contracts. The shared
    output should include track ID, source ID, frame path, class label, confidence, optional
    box or mask, device, model ID, and inference latency. Missing model assets must fail
    clearly in the hardware lane and never block the core route-guard demo.

    Update focused tests and contrib/TAC-FUSE/CHANGELOG.md for behavior, interface, or
    training readiness changes.
  verify_command: cd contrib/TAC-FUSE && uv run pytest tests/test_zero_shot_vision.py tests/test_npu_siglip.py tests/test_npu_trainer_int8.py -q
  metadata:
    alpha_gate: Trained Model Readiness
    workflow_stage: create
    trained_model_ready: true
    zero_shot_adapter_boundary_required: true
