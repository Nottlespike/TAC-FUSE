  priority: P1
  scope: contrib/TAC-FUSE/
  validation_lane: software
  prompt: |
    Working directory: AlphaHENG repo root.
    Scope: contrib/TAC-FUSE/

    Stage: Beautify.

    Run the Playwright visual path and fix concrete demo defects: text outside boxes,
    unreadable contact labels, duplicate map stories, wasted panels, scroll traps, tiny
    telemetry, and controls that are hard to reach. Keep display labels capitalized.
